<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>

  <link rel="stylesheet" th:href="@{/css/login.css}"/>

</head>

<body>

<div class="login-container">
  <h2>Регистрация</h2>

  <!-- Сообщение об ошибке -->
  <div th:if="${error}" class="error-message" th:text="${error}">
    Ошибка регистрации
  </div>

  <form th:action="@{/register}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="form-group">
      <label for="userLogin">Логин</label>
      <input type="text" id="userLogin" name="login" placeholder="Введите логин" required/>
    </div>

    <div class="form-group">
      <label for="userEmail">Email</label>
      <input type="email" id="userEmail" name="email" placeholder="Введите email" required/>
    </div>

    <div class="form-group">
      <label for="userPassword">Пароль</label>
      <input type="password" id="userPassword" name="password" placeholder="Введите пароль" required/>
    </div>

    <div class="form-group">
      <label for="userConfirmPassword">Подтвердите пароль</label>
      <input type="password" id="userConfirmPassword" name="confirmPassword" placeholder="Повторите пароль" required/>
    </div>

    <button type="submit" class="btn-login">Зарегистрироваться</button>
  </form>

  <div class="register-link">
    Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
  </div>
</div>

</body>

</html>
