<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/css/login.css}"/>
    <!-- th:href="@{/css/login.css}" href="/css/login.css"-->

</head>

<body>

<div class="login-container">
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="userLogin">Login</label>
            <input type="text" id="userLogin" name="username" autocomplete="username" required/>
        </div>

        <div class="form-group">
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" name="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-login">Войти</button>
    </form>
</div>

</body>

</html>
