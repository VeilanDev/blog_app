<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>Home</title>

    <link rel="stylesheet" th:href="@{/css/home.css}"/>
</head>

<body>

    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a th:href="@{/home}">InstBlog</a>
            </div>

            <!-- Имя/логин пользователя -->
            <div class="navbar-user" sec:authorize="isAuthenticated()">
                <div class="user-info">
                    <span class="user-name" th:text="${userName}">Имя</span>

                    <span class="user-login" th:text="${userLogin}">логин</span>
                </div>

                <!-- Кнопка выхода -->
                <form th:action="@{/logout}" method="post" class="navbar-actions" >
                    <button type="submit" class="btn-logout">Выйти</button>
                </form>
            </div>

        </div>
    </header>

    <div class="new-post-form" th:if="${loginUserPage == #authentication.getName()}">
        <form th:action="@{/posts/create}" th:object="${post}" method="post" enctype="multipart/form-data">
            <!-- CSRF токен -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="postContent">Содержание</label>
                <textarea th:field="*{text}"
                          id="postContent"
                          name="content"
                          rows="5"
                          placeholder="Напишите что-нибудь интересное..."
                          required></textarea>
            </div>

            <div class="form-group" hidden>
                <label for="postImage">Изображение (необязательно)</label>
                <input type="file"
                       id="postImage"
                       name="image"
                       accept="image/*" />
            </div>

            <button type="submit" class="btn-submit">Опубликовать</button>
        </form>
    </div>

    <div class="post-list-title" th:if="${loginUserPage == #authentication.getName()}">Ваши публикации</div>
    <div class="post-list-title" th:unless="${loginUserPage == #authentication.getName()}">Публикации <span th:text="${loginUserPage}"/></div>
    <ul class="post-list">
        <li th:each="post : ${posts}" th:if="${posts != null && !posts.isEmpty}">
            <div class="post-item" th:id="'post-' + ${post.id}">
                <div class="post-header">
                    <span class="post-author" th:text="${post.author.name}">Автор</span>
                    <div class="post-header-right">
                    <span class="post-date">
                        <span th:if="${post.redacted}">(ред.)</span>
                        <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</span>
                    </span>

                        <!-- Кнопка с тремя точками (только для автора) -->
                        <div class="dropdown" th:if="${post.author.login == #authentication.getName()}">
                            <button class="dropdown-toggle" onclick="toggleDropdown(this)" type="button">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="5" r="1.5"/>
                                    <circle cx="12" cy="12" r="1.5"/>
                                    <circle cx="12" cy="19" r="1.5"/>
                                </svg>
                            </button>
                            <div class="dropdown-menu">
                                <button class="dropdown-item btn-edit-dropdown" onclick="enableEdit(this)" type="button">Редактировать</button>
                                <button class="dropdown-item btn-delete-dropdown" onclick="confirmDelete(this)" type="button">Удалить</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="post-content">
                    <!-- Текст поста (отображается по умолчанию) -->
                    <p class="post-text"
                       th:id="'text-' + ${post.id}"
                       th:text="${post.text}">Текст публикации</p>

                    <!-- Поле для редактирования (скрыто по умолчанию) -->
                    <textarea class="post-edit-textarea"
                              th:id="'edit-' + ${post.id}"
                              style="display: none;"
                              th:text="${post.text}"></textarea>
                </div>

                <div class="post-image" th:if="${post.imagePath != null}">
                    <img th:src="@{${post.imagePath}}" alt="Изображение к посту" />
                </div>

                <div class="post-footer">
                    <div class="post-footer-left">
                        <!-- Кнопка лайка -->
                        <button class="btn-like"
                                th:data-post-id="${post.id}"
                                onclick="toggleLike(this)">
                            <span th:if="${likePostService.hasUserLiked(post.id, currentUser)}" class="heart liked">❤️</span>
                            <span th:unless="${likePostService.hasUserLiked(post.id, currentUser)}" class="heart">🤍</span>
                            <span class="likes-count" th:text="${post.getLikes()}">0</span>
                        </button>
                    </div>
                    <div class="post-footer-right" th:if="${post.author.login == #authentication.getName()}">
                        <!-- Кнопка сохранения (скрыта по умолчанию) -->
                        <button class="btn-save"
                                th:data-post-id="${post.id}"
                                style="display: none;"
                                onclick="savePost(this)">Сохранить</button>

                        <!-- Кнопка отмены (скрыта по умолчанию) -->
                        <button class="btn-cancel"
                                th:data-post-id="${post.id}"
                                style="display: none;"
                                onclick="cancelEdit(this)">Отмена</button>
                    </div>
                </div>
            </div>
        </li>
    </ul>

    <!-- Окно подтверждения удаления поста -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Подтверждение удаления</h3>
            <p>Вы уверены, что хотите удалить этот пост?</p>
            <p class="modal-post-text" id="modalPostText"></p>
            <div class="modal-actions">
                <button class="btn-confirm-delete" onclick="deletePost()">Удалить</button>
                <button class="btn-cancel-delete" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/home.js}"></script>
</body>

</html>
