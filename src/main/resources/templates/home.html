<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <meta name="userId" th:content="${userId}" />

    <title>Home</title>

    <link rel="stylesheet" th:href="@{/css/home.css}"/>
</head>

<body>

<header class="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <a th:href="@{/home}">InstBlog</a>
        </div>

        <!-- Кнопка пользователи -->
        <a th:href="@{/users}" class="btn-users">Пользователи</a>

        <!-- Имя/логин пользователя -->
        <div class="navbar-user" sec:authorize="isAuthenticated()">
            <div class="user-info">
                <span class="user-name" th:text="${userName}">Имя</span>
                <span class="user-login" th:text="${userLogin}">логин</span>
            </div>

            <!-- Кнопка выхода -->
            <form th:action="@{/logout}" method="post" class="navbar-actions">
                <button type="submit" class="btn-logout">Выйти</button>
            </form>
        </div>
    </div>
</header>

<div class="new-post-form" th:if="${loginUserPage == #authentication.getName()}">
    <form th:action="@{/posts/create}" th:object="${post}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="postContent">Содержание</label>
            <textarea th:field="*{text}"
                      id="postContent"
                      name="content"
                      rows="5"
                      placeholder="Напишите что-нибудь интересное..."
                      required></textarea>
        </div>

        <div class="form-group" hidden>
            <label for="postImage">Изображение (необязательно)</label>
            <input type="file"
                   id="postImage"
                   name="image"
                   accept="image/*" />
        </div>

        <button type="submit" class="btn-submit">Опубликовать</button>
    </form>
</div>

<div class="post-list-title" th:if="${loginUserPage == #authentication.getName()}">Ваши публикации</div>
<div class="post-list-title" th:unless="${loginUserPage == #authentication.getName()}">Публикации <span th:text="${nameUserPage}"/></div>
<ul class="post-list">
    <!-- Посты загружаются через JavaScript -->
</ul>

<!-- Окно подтверждения удаления поста -->
<div id="deleteModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>Подтверждение удаления</h3>
        <p>Вы уверены, что хотите удалить этот пост?</p>
        <p class="modal-post-text" id="modalPostText"></p>
        <div class="modal-actions">
            <button class="btn-confirm-delete" onclick="deletePost()">Удалить</button>
            <button class="btn-cancel-delete" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script th:src="@{/js/home.js}"></script>
</body>
</html>
